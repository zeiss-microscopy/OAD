# ----------------------------------------------------------------
# Experiment configuration for zenapi_stream2omezarr.py
#
# This file defines the ZEN experiment and its expected dimensions
# so that frames can be written directly to OME-ZARR on-the-fly
# (no buffering in memory required).
#
# Copy this file, adjust the values to match your ZEN experiment,
# and pass it via:
#   python zenapi_stream2omezarr.py --experiment-config my_experiment.ini
# ----------------------------------------------------------------

[experiment]
# ZEN experiment name (without .czexp extension)
name = 00_ZEN_API_OMEZARR_Stream

# CZI output name when starting experiment from script (without .czi)
czi_name = zenapi_stream

# Start the experiment from the script (true) or from ZEN UI (false)
start_from_script = false

# Allow overwriting an existing CZI file
overwrite_czi = true

[dimensions]
# Number of time points (T >= 1)
time_points = 3

# Number of channels (C >= 1)
channels = 2

# Number of Z-planes (Z >= 1)
z_planes = 15

# Z-step size in microns (only for metadata, does not affect the actual acquisition)
z_spacing = 3

# Number of tile positions / mosaic tiles (M >= 1)
tiles = 1

# Number of scenes (S >= 1)
scenes = 1

# Frame height and width (Y, X) are read automatically from the pixel stream.

[output]
# Directory where the OME-ZARR will be created
# Use forward slashes or escaped backslashes
directory = f:\Zen_Output\streaming\

# Pixel data type: uint8, uint16, or float32 (must match experiment)
dtype = uint16

# Compression: blosc-zstd, blosc-lz4, zstd, none
compression = blosc-zstd

# Overwrite existing OME-ZARR at the output path
overwrite = true

[stream]
# Filter by channel index (leave empty for all channels)
channel_index =

[zenapi]
# Path to ZEN-API gateway configuration file (config.ini)
# Leave empty to use the default config.ini next to the script
config = F:\GitHub\OAD\ZEN-API\python_examples\my_config.ini
